<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>預訂體驗 · 填寫資料 — 島嶼旅跡</title>
  <link rel="stylesheet" href="./css/style.css">
  <style>
    .booking-page { padding: 100px 5% 80px; max-width: 900px; margin: 0 auto; }
    .booking-grid { display: grid; grid-template-columns: 1fr 300px; gap: 40px; align-items: start; }

    .form-card {
      background: var(--white); border-radius: var(--radius-lg);
      box-shadow: var(--shadow-md); padding: 32px;
      margin-bottom: 24px;
    }
    .form-card-title {
      font-family: var(--font-serif); font-size: 1.1rem; font-weight: 700;
      color: var(--navy); margin-bottom: 24px;
      padding-bottom: 12px; border-bottom: 2px solid var(--sand-dark);
      display: flex; align-items: center; gap: 8px;
    }

    /* Payment methods */
    .payment-options { display: flex; flex-direction: column; gap: 12px; }
    .payment-opt {
      display: flex; align-items: center; gap: 16px;
      padding: 16px; border-radius: var(--radius-md);
      border: 2px solid var(--gray-2);
      cursor: pointer; transition: all var(--transition);
    }
    .payment-opt.selected { border-color: var(--coral); background: #FEF0EB; }
    .payment-opt input[type="radio"] { display: none; }
    .payment-opt-icon { font-size: 1.5rem; }
    .payment-opt-name { font-weight: 700; font-size: .95rem; }
    .payment-opt-sub { font-size: .78rem; color: var(--gray-4); }
    .cc-fields { display: none; margin-top: 16px; }
    .cc-fields.show { display: block; }
    .cc-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

    /* Summary */
    .booking-summary {
      background: var(--white); border-radius: var(--radius-lg);
      box-shadow: var(--shadow-md); padding: 28px;
      position: sticky; top: 100px;
    }
    .summary-title { font-family: var(--font-serif); font-size: 1rem; font-weight: 700; color: var(--navy); margin-bottom: 16px; }
    .summary-img { width: 100%; height: 120px; object-fit: cover; border-radius: var(--radius-md); margin-bottom: 14px; }
    .summary-row { display: flex; justify-content: space-between; font-size: .85rem; padding: 8px 0; border-bottom: 1px solid var(--gray-2); }
    .summary-row.total { border-bottom: none; margin-top: 8px; padding-top: 12px; }
    .summary-label { color: var(--gray-4); }
    .summary-val { font-weight: 600; }
    .total-val { font-family: var(--font-serif); font-size: 1.3rem; color: var(--coral); }

    @media (max-width: 768px) {
      .booking-grid { grid-template-columns: 1fr; }
      .booking-summary { position: static; }
    }
  </style>
</head>
<body>
<div id="nav-root"></div>

<div class="booking-page">
  <div id="steps-root" style="margin-bottom:40px;"></div>

  <div class="booking-grid">
    <div>
      <!-- Contact info -->
      <div class="form-card">
        <div class="form-card-title">👤 聯絡人資料</div>
        <div class="grid-2">
          <div class="form-group">
            <label class="form-label" for="f-name">姓名 *</label>
            <input class="form-input" id="f-name" type="text" placeholder="請輸入真實姓名">
            <div class="form-error" id="err-name">請輸入姓名</div>
          </div>
          <div class="form-group">
            <label class="form-label" for="f-phone">手機號碼 *</label>
            <input class="form-input" id="f-phone" type="tel" placeholder="09XX-XXX-XXX">
            <div class="form-error" id="err-phone">請輸入正確的手機號碼（09開頭10碼）</div>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label" for="f-email">電子信箱 *</label>
          <input class="form-input" id="f-email" type="email" placeholder="your@email.com">
          <div class="form-error" id="err-email">請輸入正確的電子信箱</div>
        </div>
        <div class="form-group">
          <label class="form-label" for="f-note">備註（選填）</label>
          <textarea class="form-textarea" id="f-note" rows="3" placeholder="有任何特殊需求或問題，請在此告知嚮導..."></textarea>
        </div>
      </div>

      <!-- Payment -->
      <div class="form-card">
        <div class="form-card-title">💳 付款方式</div>
        <div class="payment-options">
          <label class="payment-opt selected" onclick="selectPayment('card', this)">
            <input type="radio" name="payment" value="card" checked>
            <div class="payment-opt-icon">💳</div>
            <div>
              <div class="payment-opt-name">信用卡 / 金融卡</div>
              <div class="payment-opt-sub">VISA、MasterCard、JCB</div>
            </div>
          </label>
          <label class="payment-opt" onclick="selectPayment('linepay', this)">
            <input type="radio" name="payment" value="linepay">
            <div class="payment-opt-icon" style="font-size:1.2rem;background:#00C300;color:#fff;width:40px;height:40px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:900;flex-shrink:0;">L</div>
            <div>
              <div class="payment-opt-name">LINE Pay</div>
              <div class="payment-opt-sub">快速、安全的行動支付</div>
            </div>
          </label>
          <label class="payment-opt" onclick="selectPayment('applepay', this)">
            <input type="radio" name="payment" value="applepay">
            <div class="payment-opt-icon">🍎</div>
            <div>
              <div class="payment-opt-name">Apple Pay</div>
              <div class="payment-opt-sub">Face ID / Touch ID 快速付款</div>
            </div>
          </label>
        </div>

        <div class="cc-fields show" id="cc-fields">
          <div class="form-group" style="margin-top:16px;">
            <label class="form-label" for="f-cardno">卡號 *</label>
            <input class="form-input" id="f-cardno" type="text" placeholder="XXXX XXXX XXXX XXXX" maxlength="19" oninput="formatCard(this)">
            <div class="form-error" id="err-card">請輸入正確的信用卡號碼（16碼）</div>
          </div>
          <div class="cc-row">
            <div class="form-group">
              <label class="form-label" for="f-exp">有效期限</label>
              <input class="form-input" id="f-exp" type="text" placeholder="MM/YY" maxlength="5" oninput="formatExp(this)">
            </div>
            <div class="form-group">
              <label class="form-label" for="f-cvv">安全碼</label>
              <input class="form-input" id="f-cvv" type="text" placeholder="CVV" maxlength="3">
            </div>
          </div>
        </div>
      </div>

      <button class="btn btn-primary" style="width:100%;font-size:1.05rem;padding:18px;" onclick="submitForm()">
        確認預訂並付款 🔒
      </button>
      <p style="text-align:center;font-size:.78rem;color:var(--gray-4);margin-top:12px;">
        點擊後即代表您同意我們的服務條款與隱私政策
      </p>
    </div>

    <!-- Summary -->
    <div class="booking-summary">
      <div class="summary-title">訂單摘要</div>
      <img class="summary-img" id="summary-img" src="" alt="">
      <div style="font-weight:700;font-size:.92rem;color:var(--navy);margin-bottom:14px;" id="summary-name"></div>
      <div class="summary-row"><span class="summary-label">日期</span><span class="summary-val" id="sum-date">—</span></div>
      <div class="summary-row"><span class="summary-label">場次</span><span class="summary-val" id="sum-session">—</span></div>
      <div class="summary-row"><span class="summary-label">人數</span><span class="summary-val">1 人</span></div>
      <div class="summary-row total"><span class="summary-label" style="font-weight:700;">總金額</span><span class="total-val" id="sum-total">—</span></div>
    </div>
  </div>
</div>

<div id="footer-root"></div>
<script src="./js/prevent-devtools.js"></script>
<script src="./js/shared.js"></script>
<script>
  document.getElementById('nav-root').innerHTML = renderNavbar('');
  document.getElementById('footer-root').innerHTML = renderFooter();
  document.getElementById('steps-root').innerHTML = renderSteps(2);
  initNavbar();
  document.getElementById('navbar').classList.remove('transparent');
  document.getElementById('navbar').classList.add('scrolled');

  const params = new URLSearchParams(location.search);
  const id = parseInt(params.get('id')) || 1;
  const date = params.get('date') || '—';
  const session = params.get('session') || '—';
  const exp = EXPERIENCES.find(e => e.id === id) || EXPERIENCES[0];

  document.getElementById('summary-img').src = exp.img;
  document.getElementById('summary-name').textContent = exp.title;
  document.getElementById('sum-date').textContent = date;
  document.getElementById('sum-session').textContent = session;
  document.getElementById('sum-total').textContent = `NT$ ${exp.price.toLocaleString()}`;

  // Payment selection
  function selectPayment(type, label) {
    document.querySelectorAll('.payment-opt').forEach(o => o.classList.remove('selected'));
    label.classList.add('selected');
    document.getElementById('cc-fields').classList.toggle('show', type === 'card');
  }

  // Card formatting
  function formatCard(el) {
    let v = el.value.replace(/\D/g,'').substring(0,16);
    el.value = v.replace(/(.{4})/g,'$1 ').trim();
  }
  function formatExp(el) {
    let v = el.value.replace(/\D/g,'').substring(0,4);
    if (v.length >= 3) v = v.slice(0,2) + '/' + v.slice(2);
    el.value = v;
  }

  // Validation
  function validate() {
    let ok = true;
    const name = document.getElementById('f-name').value.trim();
    const phone = document.getElementById('f-phone').value.trim();
    const email = document.getElementById('f-email').value.trim();
    const cardno = document.getElementById('f-cardno').value.replace(/\s/g,'');
    const isCard = document.querySelector('input[name="payment"]:checked').value === 'card';

    function setErr(id, inputId, show) {
      document.getElementById(id).classList.toggle('show', show);
      document.getElementById(inputId).classList.toggle('error', show);
      if (show) ok = false;
    }
    setErr('err-name', 'f-name', name.length < 2);
    setErr('err-phone', 'f-phone', !/^09\d{8}$/.test(phone.replace(/[-\s]/g,'')));
    setErr('err-email', 'f-email', !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email));
    if (isCard) setErr('err-card', 'f-cardno', cardno.length !== 16);
    return ok;
  }

  function submitForm() {
    if (!validate()) return;
    const name = document.getElementById('f-name').value.trim();
    const email = document.getElementById('f-email').value.trim();
    location.href = `booking-success.html?id=${id}&date=${encodeURIComponent(date)}&session=${encodeURIComponent(session)}&name=${encodeURIComponent(name)}&email=${encodeURIComponent(email)}`;
  }
</script>
</body>
</html>
