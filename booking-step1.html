<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>預訂體驗 · 選擇日期 — 島嶼旅跡</title>
  <link rel="stylesheet" href="./css/style.css">
  <style>
    .booking-page { padding: 100px 5% 80px; max-width: 900px; margin: 0 auto; }
    .booking-grid { display: grid; grid-template-columns: 1fr 320px; gap: 40px; align-items: start; }

    /* Calendar */
    .calendar {
      background: var(--white); border-radius: var(--radius-lg);
      box-shadow: var(--shadow-md); padding: 28px;
    }
    .cal-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 20px;
    }
    .cal-title { font-family: var(--font-serif); font-size: 1.1rem; font-weight: 700; color: var(--navy); }
    .cal-nav {
      width: 36px; height: 36px; border-radius: 50%;
      border: 2px solid var(--gray-2); background: none;
      cursor: pointer; font-size: 1rem;
      display: flex; align-items: center; justify-content: center;
      transition: all var(--transition);
    }
    .cal-nav:hover { border-color: var(--coral); color: var(--coral); }
    .cal-weekdays {
      display: grid; grid-template-columns: repeat(7,1fr);
      gap: 4px; margin-bottom: 8px;
    }
    .cal-weekday { text-align: center; font-size: .75rem; font-weight: 700; color: var(--gray-4); padding: 4px 0; }
    .cal-days { display: grid; grid-template-columns: repeat(7,1fr); gap: 4px; }
    .cal-day {
      aspect-ratio: 1; display: flex; align-items: center; justify-content: center;
      border-radius: 50%; font-size: .9rem; cursor: pointer;
      transition: all var(--transition);
      border: 2px solid transparent;
    }
    .cal-day:hover:not(.disabled):not(.past) { background: var(--sand-dark); }
    .cal-day.selected { background: var(--coral); color: var(--white); font-weight: 700; }
    .cal-day.today { border-color: var(--coral); font-weight: 700; }
    .cal-day.past, .cal-day.disabled { opacity: .3; cursor: not-allowed; }
    .cal-day.empty { cursor: default; }

    /* Sessions */
    .sessions { margin-top: 24px; }
    .sessions-title {
      font-size: .85rem; font-weight: 700; color: var(--navy);
      margin-bottom: 12px; text-transform: uppercase; letter-spacing: .06em;
    }
    .session-btns { display: flex; gap: 12px; flex-wrap: wrap; }
    .session-btn {
      flex: 1; min-width: 140px;
      padding: 16px; border-radius: var(--radius-md);
      border: 2px solid var(--gray-2);
      cursor: pointer; background: var(--white);
      text-align: center; transition: all var(--transition);
      opacity: .5; pointer-events: none;
    }
    .session-btn.enabled { opacity: 1; pointer-events: auto; }
    .session-btn.enabled:hover { border-color: var(--coral); }
    .session-btn.selected { border-color: var(--coral); background: #FEF0EB; }
    .session-time { font-family: var(--font-serif); font-size: 1.1rem; font-weight: 700; color: var(--navy); }
    .session-label { font-size: .78rem; color: var(--gray-4); margin-top: 2px; }

    /* Summary sidebar */
    .booking-summary {
      background: var(--white); border-radius: var(--radius-lg);
      box-shadow: var(--shadow-md); padding: 28px;
      position: sticky; top: 100px;
    }
    .summary-title { font-family: var(--font-serif); font-size: 1rem; font-weight: 700; color: var(--navy); margin-bottom: 16px; }
    .summary-img { width: 100%; height: 140px; object-fit: cover; border-radius: var(--radius-md); margin-bottom: 14px; }
    .summary-exp-name { font-weight: 700; font-size: .95rem; color: var(--navy); margin-bottom: 12px; }
    .summary-row { display: flex; justify-content: space-between; font-size: .85rem; padding: 8px 0; border-bottom: 1px solid var(--gray-2); }
    .summary-row:last-of-type { border-bottom: none; }
    .summary-label { color: var(--gray-4); }
    .summary-val { font-weight: 600; color: var(--text); }
    .summary-selected { color: var(--coral); }

    @media (max-width: 768px) {
      .booking-grid { grid-template-columns: 1fr; }
      .booking-summary { position: static; }
    }
  </style>
</head>
<body>
<div id="nav-root"></div>

<div class="booking-page">
  <div id="steps-root" style="margin-bottom:40px;"></div>

  <div class="booking-grid">
    <div>
      <div class="calendar">
        <div class="cal-header">
          <button class="cal-nav" onclick="prevMonth()">‹</button>
          <div class="cal-title" id="cal-title"></div>
          <button class="cal-nav" onclick="nextMonth()">›</button>
        </div>
        <div class="cal-weekdays">
          <div class="cal-weekday">日</div><div class="cal-weekday">一</div>
          <div class="cal-weekday">二</div><div class="cal-weekday">三</div>
          <div class="cal-weekday">四</div><div class="cal-weekday">五</div>
          <div class="cal-weekday">六</div>
        </div>
        <div class="cal-days" id="cal-days"></div>
      </div>

      <div class="sessions" style="background:var(--white);border-radius:var(--radius-lg);box-shadow:var(--shadow-sm);padding:28px;margin-top:20px;">
        <div class="sessions-title">選擇場次</div>
        <div class="session-btns">
          <button class="session-btn" id="sess-am" onclick="selectSession('上午場 09:00')">
            <div class="session-time">09:00</div>
            <div class="session-label">🌅 上午場</div>
          </button>
          <button class="session-btn" id="sess-pm" onclick="selectSession('下午場 14:00')">
            <div class="session-time">14:00</div>
            <div class="session-label">🌞 下午場</div>
          </button>
        </div>

        <div style="margin-top:28px;">
          <button class="btn btn-primary" id="next-btn" style="width:100%;padding:16px;font-size:1.05rem;opacity:.4;pointer-events:none;" onclick="goNext()">
            下一步：填寫旅客資料 →
          </button>
        </div>
      </div>
    </div>

    <!-- Summary -->
    <div class="booking-summary">
      <div class="summary-title">預訂摘要</div>
      <img class="summary-img" id="summary-img" src="" alt="">
      <div class="summary-exp-name" id="summary-name">載入中...</div>
      <div class="summary-row"><span class="summary-label">目的地</span><span class="summary-val" id="sum-region">—</span></div>
      <div class="summary-row"><span class="summary-label">時間長度</span><span class="summary-val" id="sum-duration">—</span></div>
      <div class="summary-row"><span class="summary-label">選擇日期</span><span class="summary-val summary-selected" id="sum-date">尚未選擇</span></div>
      <div class="summary-row"><span class="summary-label">選擇場次</span><span class="summary-val summary-selected" id="sum-session">尚未選擇</span></div>
      <div class="summary-row" style="margin-top:8px;"><span class="summary-label" style="font-weight:700;">價格</span><span class="summary-val" style="font-family:var(--font-serif);font-size:1.1rem;color:var(--coral);" id="sum-price">—</span></div>
    </div>
  </div>
</div>

<div id="footer-root"></div>
<script src="./js/prevent-devtools.js"></script>
<script src="./js/shared.js"></script>
<script>
  document.getElementById('nav-root').innerHTML = renderNavbar('');
  document.getElementById('footer-root').innerHTML = renderFooter();
  document.getElementById('steps-root').innerHTML = renderSteps(1);
  initNavbar();
  document.getElementById('navbar').classList.remove('transparent');
  document.getElementById('navbar').classList.add('scrolled');

  const params = new URLSearchParams(location.search);
  const id = parseInt(params.get('id')) || 1;
  const exp = EXPERIENCES.find(e => e.id === id) || EXPERIENCES[0];

  document.getElementById('summary-img').src = exp.img;
  document.getElementById('summary-name').textContent = exp.title;
  document.getElementById('sum-region').textContent = exp.region;
  document.getElementById('sum-duration').textContent = exp.duration;
  document.getElementById('sum-price').textContent = `NT$ ${exp.price.toLocaleString()} / 人`;

  // Calendar
  let curYear, curMonth;
  const today = new Date();
  curYear = today.getFullYear();
  curMonth = today.getMonth();
  let selectedDate = null;
  let selectedSession = null;

  function renderCal() {
    const months = ['一月','二月','三月','四月','五月','六月','七月','八月','九月','十月','十一月','十二月'];
    document.getElementById('cal-title').textContent = `${curYear} 年 ${months[curMonth]}`;
    const firstDay = new Date(curYear, curMonth, 1).getDay();
    const daysInMonth = new Date(curYear, curMonth + 1, 0).getDate();
    const el = document.getElementById('cal-days');
    el.innerHTML = '';
    for (let i = 0; i < firstDay; i++) {
      el.innerHTML += `<div class="cal-day empty"></div>`;
    }
    for (let d = 1; d <= daysInMonth; d++) {
      const date = new Date(curYear, curMonth, d);
      const isPast = date < new Date(today.getFullYear(), today.getMonth(), today.getDate());
      const isToday = d === today.getDate() && curMonth === today.getMonth() && curYear === today.getFullYear();
      const isSelected = selectedDate && selectedDate.getDate() === d && selectedDate.getMonth() === curMonth && selectedDate.getFullYear() === curYear;
      const cls = ['cal-day', isPast ? 'past' : '', isToday ? 'today' : '', isSelected ? 'selected' : ''].filter(Boolean).join(' ');
      el.innerHTML += `<div class="${cls}" onclick="${isPast ? '' : `selectDate(${curYear},${curMonth},${d})`}">${d}</div>`;
    }
  }
  function prevMonth() {
    curMonth--; if (curMonth < 0) { curMonth = 11; curYear--; }
    renderCal();
  }
  function nextMonth() {
    curMonth++; if (curMonth > 11) { curMonth = 0; curYear++; }
    renderCal();
  }
  function selectDate(y, m, d) {
    selectedDate = new Date(y, m, d);
    selectedSession = null;
    document.getElementById('sum-date').textContent = `${y}/${m+1}/${d}`;
    document.getElementById('sum-session').textContent = '尚未選擇';
    document.querySelectorAll('.session-btn').forEach(b => { b.classList.add('enabled'); b.classList.remove('selected'); });
    document.getElementById('next-btn').style.opacity = '.4';
    document.getElementById('next-btn').style.pointerEvents = 'none';
    renderCal();
  }
  function selectSession(sess) {
    selectedSession = sess;
    document.querySelectorAll('.session-btn').forEach(b => b.classList.remove('selected'));
    const btn = sess.includes('09') ? document.getElementById('sess-am') : document.getElementById('sess-pm');
    btn.classList.add('selected');
    document.getElementById('sum-session').textContent = sess;
    if (selectedDate) {
      document.getElementById('next-btn').style.opacity = '1';
      document.getElementById('next-btn').style.pointerEvents = 'auto';
    }
  }
  function goNext() {
    if (!selectedDate || !selectedSession) return;
    const d = `${selectedDate.getFullYear()}/${selectedDate.getMonth()+1}/${selectedDate.getDate()}`;
    location.href = `booking-step2.html?id=${id}&date=${encodeURIComponent(d)}&session=${encodeURIComponent(selectedSession)}`;
  }
  renderCal();
</script>
</body>
</html>
