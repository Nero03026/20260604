<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>個人中心 — 島嶼旅跡</title>
  <link rel="stylesheet" href="./css/style.css">
  <style>
    .profile-layout {
      padding: 100px 5% 80px;
      display: grid; grid-template-columns: 240px 1fr;
      gap: 32px; max-width: 1100px; margin: 0 auto;
      align-items: start;
    }

    /* Sidebar */
    .profile-sidebar {
      position: sticky; top: 100px;
    }
    .profile-card {
      background: var(--white); border-radius: var(--radius-lg);
      box-shadow: var(--shadow-sm); padding: 28px 20px;
      text-align: center; margin-bottom: 16px;
    }
    .profile-avatar {
      width: 72px; height: 72px; border-radius: 50%;
      object-fit: cover; margin: 0 auto 12px; display: block;
      border: 3px solid var(--coral);
    }
    .profile-name { font-family: var(--font-serif); font-size: 1.1rem; font-weight: 700; color: var(--navy); }
    .profile-email { font-size: .8rem; color: var(--gray-4); margin-top: 4px; }
    .profile-badge {
      display: inline-block; margin-top: 10px;
      background: var(--green-light); color: var(--green);
      font-size: .72rem; font-weight: 700; padding: 3px 12px; border-radius: 50px;
    }

    .profile-menu { list-style: none; display: flex; flex-direction: column; gap: 4px; }
    .profile-menu-item {
      display: flex; align-items: center; gap: 10px;
      padding: 12px 16px; border-radius: var(--radius-md);
      cursor: pointer; font-size: .9rem; font-weight: 500;
      color: var(--gray-4); transition: all var(--transition);
      border: none; background: none; width: 100%; text-align: left;
    }
    .profile-menu-item:hover { background: var(--sand); color: var(--navy); }
    .profile-menu-item.active { background: #FEF0EB; color: var(--coral); font-weight: 700; }
    .menu-icon { font-size: 1.1rem; width: 20px; }

    /* Content panels */
    .profile-panel { display: none; }
    .profile-panel.active { display: block; }
    .panel-title {
      font-family: var(--font-serif); font-size: 1.4rem; font-weight: 700;
      color: var(--navy); margin-bottom: 24px;
    }

    /* Orders table */
    .orders-table { width: 100%; border-collapse: collapse; }
    .orders-table th {
      text-align: left; padding: 12px 16px;
      font-size: .78rem; font-weight: 700; color: var(--gray-4);
      text-transform: uppercase; letter-spacing: .06em;
      border-bottom: 2px solid var(--gray-2);
    }
    .orders-table td {
      padding: 16px; border-bottom: 1px solid var(--gray-2);
      font-size: .88rem; vertical-align: middle;
    }
    .orders-table tr:last-child td { border-bottom: none; }
    .orders-table tr:hover td { background: var(--gray-1); }
    .order-exp { display: flex; align-items: center; gap: 12px; }
    .order-img { width: 52px; height: 40px; border-radius: var(--radius-sm); object-fit: cover; flex-shrink: 0; }
    .order-exp-name { font-weight: 600; font-size: .9rem; }
    .order-exp-date { font-size: .78rem; color: var(--gray-4); }
    .cancel-btn {
      padding: 5px 14px; border-radius: 50px;
      border: 1px solid #E53E3E; color: #E53E3E;
      font-size: .78rem; font-weight: 700; cursor: pointer;
      background: none; transition: all var(--transition);
    }
    .cancel-btn:hover { background: #E53E3E; color: var(--white); }

    /* Wishlist grid */
    .wishlist-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; }

    /* Profile edit form */
    .profile-form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }

    /* Modal */
    .modal-icon { font-size: 2.5rem; margin-bottom: 12px; text-align: center; }
    .modal-title { font-family: var(--font-serif); font-size: 1.3rem; font-weight: 700; color: var(--navy); text-align: center; margin-bottom: 8px; }
    .modal-sub { font-size: .9rem; color: var(--gray-4); text-align: center; margin-bottom: 28px; }
    .modal-actions { display: flex; gap: 12px; }

    .empty-state { text-align: center; padding: 60px 20px; color: var(--gray-4); }
    .empty-icon { font-size: 3rem; margin-bottom: 16px; }

    @media (max-width: 768px) {
      .profile-layout { grid-template-columns: 1fr; }
      .profile-sidebar { position: static; }
      .orders-table { font-size: .8rem; }
      .profile-form-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
<div id="nav-root"></div>

<div class="profile-layout">
  <!-- Sidebar -->
  <div class="profile-sidebar">
    <div class="profile-card">
      <img class="profile-avatar" id="profile-avatar" src="https://i.pravatar.cc/150?img=47" alt="會員">
      <div class="profile-name" id="profile-name">旅遊達人</div>
      <div class="profile-email" id="profile-email">user@email.com</div>
      <div class="profile-badge">⭐ 探險會員</div>
    </div>

    <ul class="profile-menu">
      <li><button class="profile-menu-item active" data-panel="orders" onclick="switchPanel('orders', this)"><span class="menu-icon">📋</span> 訂單紀錄</button></li>
      <li><button class="profile-menu-item" data-panel="wishlist" onclick="switchPanel('wishlist', this)"><span class="menu-icon">❤️</span> 我的收藏</button></li>
      <li><button class="profile-menu-item" data-panel="info" onclick="switchPanel('info', this)"><span class="menu-icon">👤</span> 個人資料</button></li>
      <li><button class="profile-menu-item" style="color:#E53E3E;margin-top:8px;" onclick="doLogout()"><span class="menu-icon">🚪</span> 登出</button></li>
    </ul>
  </div>

  <!-- Main content -->
  <div>
    <!-- Orders panel -->
    <div class="profile-panel active" id="panel-orders">
      <div class="panel-title">訂單紀錄</div>
      <div id="orders-content"></div>
    </div>

    <!-- Wishlist panel -->
    <div class="profile-panel" id="panel-wishlist">
      <div class="panel-title">我的收藏</div>
      <div id="wishlist-content"></div>
    </div>

    <!-- Profile edit panel -->
    <div class="profile-panel" id="panel-info">
      <div class="panel-title">個人資料</div>
      <div style="background:var(--white);border-radius:var(--radius-lg);box-shadow:var(--shadow-sm);padding:32px;">
        <div class="profile-form-grid">
          <div class="form-group">
            <label class="form-label">姓名</label>
            <input class="form-input" id="edit-name" type="text">
          </div>
          <div class="form-group">
            <label class="form-label">手機號碼</label>
            <input class="form-input" type="tel" placeholder="09XX-XXXXXX">
          </div>
          <div class="form-group">
            <label class="form-label">電子信箱</label>
            <input class="form-input" id="edit-email" type="email">
          </div>
          <div class="form-group">
            <label class="form-label">出生日期</label>
            <input class="form-input" type="date">
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">旅遊偏好</label>
          <div style="display:flex;flex-wrap:wrap;gap:8px;margin-top:8px;">
            <button class="chip active">🏔 戶外冒險</button>
            <button class="chip">🎨 手作工藝</button>
            <button class="chip active">🍜 美食料理</button>
            <button class="chip">🏛 文化歷史</button>
          </div>
        </div>
        <button class="btn btn-primary" onclick="alert('已儲存！')">儲存更改</button>
      </div>
    </div>
  </div>
</div>

<!-- Cancel modal -->
<div class="modal-overlay" id="cancel-modal">
  <div class="modal">
    <div class="modal-icon">⚠️</div>
    <div class="modal-title">確認取消訂單</div>
    <div class="modal-sub" id="cancel-modal-sub">取消後將依退款政策處理退款，確定要取消嗎？</div>
    <div class="modal-actions">
      <button class="btn btn-outline" style="flex:1;" onclick="closeModal()">再想想</button>
      <button class="btn btn-primary" style="flex:1;background:#E53E3E;box-shadow:none;" onclick="confirmCancel()">確認取消</button>
    </div>
  </div>
</div>

<div id="footer-root"></div>
<script src="./js/prevent-devtools.js"></script>
<script src="./js/shared.js"></script>
<script>
  document.getElementById('nav-root').innerHTML = renderNavbar('');
  document.getElementById('footer-root').innerHTML = renderFooter();
  initNavbar();
  document.getElementById('navbar').classList.remove('transparent');
  document.getElementById('navbar').classList.add('scrolled');

  // Load user
  const user = JSON.parse(localStorage.getItem('it_user') || '{"name":"旅遊達人","email":"demo@islandtrace.tw"}');
  document.getElementById('profile-name').textContent = user.name;
  document.getElementById('profile-email').textContent = user.email;
  document.getElementById('edit-name').value = user.name;
  document.getElementById('edit-email').value = user.email;

  // Panel switching
  function switchPanel(name, btn) {
    document.querySelectorAll('.profile-panel').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.profile-menu-item').forEach(b => b.classList.remove('active'));
    document.getElementById('panel-' + name).classList.add('active');
    btn.classList.add('active');
    if (name === 'wishlist') renderWishlist();
  }

  // Orders
  function renderOrders() {
    const orders = JSON.parse(localStorage.getItem('it_orders') || '[]');
    // Add demo orders if empty
    if (orders.length === 0) {
      orders.push(
        { orderNo:'IT2025A1', expId:1, expName:'清水斷崖獨木舟探險', region:'花蓮', date:'2025/7/15', session:'上午場 09:00', name:user.name, total:1800, status:'未出發', img:EXPERIENCES[0].img },
        { orderNo:'IT2025B2', expId:5, expName:'淡水老街藍染拼布工作坊', region:'新北', date:'2025/5/20', session:'下午場 14:00', name:user.name, total:1200, status:'已完成', img:EXPERIENCES[4].img },
      );
    }
    if (orders.length === 0) {
      document.getElementById('orders-content').innerHTML = `<div class="empty-state"><div class="empty-icon">📋</div><div style="font-size:1.05rem;font-weight:700;margin-bottom:8px;">還沒有訂單紀錄</div><a href="products.html" class="btn btn-primary" style="margin-top:16px;">探索體驗</a></div>`;
      return;
    }
    document.getElementById('orders-content').innerHTML = `
      <table class="orders-table">
        <thead><tr>
          <th>體驗</th><th>日期 / 場次</th><th>金額</th><th>狀態</th><th></th>
        </tr></thead>
        <tbody>
          ${orders.map((o,i) => `
            <tr>
              <td><div class="order-exp">
                <img class="order-img" src="${o.img}" alt="">
                <div><div class="order-exp-name">${o.expName}</div><div class="order-exp-date">📍 ${o.region}</div></div>
              </div></td>
              <td><div>${o.date}</div><div style="font-size:.78rem;color:var(--gray-4);">${o.session}</div></td>
              <td style="font-weight:700;color:var(--coral);font-family:var(--font-serif);">NT$ ${o.total.toLocaleString()}</td>
              <td><span class="badge ${o.status==='已完成'?'badge-green':'badge-coral'}">${o.status}</span></td>
              <td>${o.status==='未出發'?`<button class="cancel-btn" onclick="openCancel(${i},'${o.expName}')">取消訂單</button>`:''}</td>
            </tr>
          `).join('')}
        </tbody>
      </table>`;
  }
  renderOrders();

  // Wishlist
  function renderWishlist() {
    const liked = getLiked();
    const items = EXPERIENCES.filter(e => liked.includes(e.id));
    if (items.length === 0) {
      document.getElementById('wishlist-content').innerHTML = `<div class="empty-state"><div class="empty-icon">💔</div><div style="font-size:1.05rem;font-weight:700;margin-bottom:8px;">收藏清單是空的</div><div style="font-size:.9rem;margin-bottom:20px;">在體驗列表頁點選愛心圖示，即可加入收藏</div><a href="products.html" class="btn btn-primary">去探索體驗</a></div>`;
      return;
    }
    document.getElementById('wishlist-content').innerHTML = `<div class="wishlist-grid">${items.map(e => renderCard(e)).join('')}</div>`;
  }

  // Chips toggle
  document.querySelectorAll('.chip').forEach(c => {
    c.addEventListener('click', () => c.classList.toggle('active'));
  });

  // Cancel modal
  let cancelIdx = -1;
  function openCancel(idx, name) {
    cancelIdx = idx;
    document.getElementById('cancel-modal-sub').textContent = `確定要取消「${name}」嗎？取消後將依退款政策處理退款。`;
    document.getElementById('cancel-modal').classList.add('open');
  }
  function closeModal() {
    document.getElementById('cancel-modal').classList.remove('open');
  }
  function confirmCancel() {
    const orders = JSON.parse(localStorage.getItem('it_orders') || '[]');
    if (cancelIdx >= 0 && orders[cancelIdx]) {
      orders.splice(cancelIdx, 1);
      localStorage.setItem('it_orders', JSON.stringify(orders));
    }
    closeModal();
    renderOrders();
  }
  document.getElementById('cancel-modal').addEventListener('click', e => {
    if (e.target === e.currentTarget) closeModal();
  });

  function doLogout() {
    localStorage.removeItem('it_user');
    location.href = 'login.html';
  }
</script>
</body>
</html>
